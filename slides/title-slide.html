<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OnQ — Title Slide · Team Fenners × LB Energy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700&display=swap');
:root{
  --coral:#ff6148; --ember:#f24227; --ocean:#19567b; --navy:#1e4268; --sky:#0b75b7;
  --ink:#191919; --muted:#8f8f9d; --mist:#f1f1f1;
  --font:'Barlow',system-ui,Segoe UI,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d0d0d;font-family:var(--font);}
body{display:flex;align-items:center;justify-content:center;}

/* 16:9 slide, scales to viewport */
.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
.slide{
  position:relative;width:1280px;height:720px;overflow:hidden;
  background:var(--ink);
  color:#fff;
  flex:0 0 auto;
  transform-origin:center;
}
/* brand gradient sheen + radial glows */
.slide::before{content:"";position:absolute;inset:0;
  background:
   radial-gradient(1100px 600px at 88% -8%, rgba(255,97,72,.42), transparent 60%),
   radial-gradient(1000px 620px at 4% 112%, rgba(25,86,123,.55), transparent 60%),
   linear-gradient(45deg,#15334a 0%, #191919 48%, #2a1410 100%);
  z-index:0;}
/* faint diagonal grid texture */
.slide::after{content:"";position:absolute;inset:0;z-index:0;opacity:.06;
  background-image:linear-gradient(135deg,#fff 1px,transparent 1px);background-size:42px 42px;}

.frame{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;padding:54px 72px;}

/* top hairline accent */
.topbar{position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--ocean),var(--sky),var(--coral),var(--ember));z-index:3;}

.eyebrow{font-weight:700;font-size:13px;letter-spacing:4px;text-transform:uppercase;
  color:#dfe6ec;opacity:.85;text-align:center;}

/* partner lockup */
.partners{display:flex;align-items:center;gap:30px;}
.chip{height:118px;display:flex;align-items:center;justify-content:center;padding:16px 26px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);}
.chip.white{background:#fff;}
.chip.coral{background:var(--coral);}
.chip img{height:86px;display:block;}
.chip .lbmark{height:78px;width:48px;display:block;}
.cross{font-weight:300;font-size:34px;color:#cbd5dd;opacity:.8;}
.plabel{margin-top:14px;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);text-align:center;}

/* center project plate */
.hero{display:flex;flex-direction:column;align-items:center;gap:6px;}
.plate{background:#fff;padding:34px 70px 30px;box-shadow:0 22px 60px rgba(0,0,0,.45);
  position:relative;}
.plate::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--ocean),var(--coral));}
.plate img{height:208px;display:block;}
.tagline{margin-top:6px;font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;
  color:#dfe6ec;opacity:.9;}

/* diamonds motif */
.dmds{display:flex;gap:9px;align-items:center;margin-top:4px;}
.dmd{width:13px;height:13px;background:var(--coral);transform:rotate(45deg);}
.dmd:nth-child(2){background:var(--sky);}
.dmd:nth-child(3){background:var(--ocean);}

/* names + event text box */
.textbox{width:760px;border:1.5px solid rgba(255,255,255,.32);
  background:rgba(255,255,255,.05);backdrop-filter:blur(2px);
  padding:18px 28px;text-align:center;}
.names{font-weight:300;font-size:20px;color:#eef2f5;letter-spacing:.5px;}
.names .ph{color:#9fb0bd;font-style:italic;}
.event{margin-top:8px;font-weight:700;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--coral);}
.event .sub{display:block;margin-top:3px;font-weight:400;font-size:12px;letter-spacing:1px;
  text-transform:none;color:#cdd6dd;}
</style>
</head>
